<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Atlas Loop</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0c0e0c;
      }

      .scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #0c0e0c;
      }

      .atlas,
      .echo {
        position: absolute;
        inset: -4%;
        width: 108%;
        height: 108%;
        object-fit: cover;
        will-change: transform, opacity;
      }

      .echo {
        opacity: 0.15;
        mix-blend-mode: screen;
        clip-path: polygon(57% 0, 100% 0, 100% 100%, 45% 100%);
        filter: contrast(1.15) saturate(0.8);
      }

      svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .orbit {
        fill: none;
        stroke: rgba(243, 239, 229, 0.2);
        stroke-width: 1;
      }

      .trace {
        fill: none;
        stroke: #d84432;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 0 1;
        pathlength: 1;
      }

      .pulse {
        fill: #d84432;
        transform-box: fill-box;
        transform-origin: center;
      }

      .grain {
        position: absolute;
        inset: 0;
        opacity: 0.09;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
      }

      .shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(8, 9, 8, 0.44),
          transparent 58%
        );
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <img class="atlas" src="../assets/brand/hero-atlas.webp" alt="" />
      <img class="echo" src="../assets/brand/hero-atlas.webp" alt="" />
      <svg viewBox="0 0 1440 810" aria-hidden="true">
        <circle class="orbit orbit-a" cx="1110" cy="252" r="205" />
        <circle class="orbit orbit-b" cx="1020" cy="515" r="118" />
        <path
          class="trace"
          pathLength="1"
          d="M802 790 C 890 696, 930 640, 966 566 S 982 402, 1045 329 S 1118 178, 1220 36"
        />
        <circle class="pulse pulse-a" cx="965" cy="566" r="7" />
        <circle class="pulse pulse-b" cx="1045" cy="329" r="6" />
        <circle class="pulse pulse-c" cx="1128" cy="172" r="5" />
      </svg>
      <div class="shade"></div>
      <div class="grain"></div>
    </div>
    <script>
      const atlas = document.querySelector(".atlas");
      const echo = document.querySelector(".echo");
      const trace = document.querySelector(".trace");
      const orbits = [...document.querySelectorAll(".orbit")];
      const pulses = [...document.querySelectorAll(".pulse")];
      const duration = 8000;

      window.__renderAt = (time) => {
        const progress = (time % duration) / duration;
        const phase = progress * Math.PI * 2;
        const x = Math.sin(phase) * 9;
        const y = Math.cos(phase) * 6;
        const scale = 1.02 + (Math.sin(phase - Math.PI / 2) + 1) * 0.006;
        atlas.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
        echo.style.transform = `translate3d(${-x * 0.75}px, ${-y * 0.75}px, 0) scale(${1.025 + Math.cos(phase) * 0.004})`;
        echo.style.opacity = String(0.1 + (Math.sin(phase) + 1) * 0.035);

        const visible = 0.58 + Math.sin(phase - Math.PI / 2) * 0.22;
        trace.style.strokeDasharray = `${visible} ${1 - visible}`;
        trace.style.strokeDashoffset = String(-progress * 0.14);

        orbits.forEach((orbit, index) => {
          const amount = index ? -2.2 : 1.5;
          orbit.style.transform = `rotate(${Math.sin(phase) * amount}deg)`;
          orbit.style.transformOrigin = `${orbit.getAttribute("cx")}px ${orbit.getAttribute("cy")}px`;
          orbit.style.opacity = String(0.55 + Math.cos(phase + index) * 0.18);
        });

        pulses.forEach((pulse, index) => {
          const pulsePhase = phase + index * 1.7;
          const pulseScale = 0.75 + (Math.sin(pulsePhase) + 1) * 0.28;
          pulse.style.transform = `scale(${pulseScale})`;
          pulse.style.opacity = String(0.55 + (Math.sin(pulsePhase) + 1) * 0.2);
        });
      };

      function animate(time) {
        window.__renderAt(time);
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    </script>
  </body>
</html>
